<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>New Tab</title>
    <style>
        :root {
            --glass-bg: rgba(0, 0, 0, 0.2); 
            --glass-border: rgba(255, 255, 255, 0.05);
            --input-bg: rgba(255, 255, 255, 0.03); 
            --text-color: rgba(255, 255, 255, 0.9);
            --text-sub: rgba(255, 255, 255, 0.5);
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, rgba(160, 210, 230, 0.1) 0%, rgba(160, 210, 230, 0) 40%), #050810;
            font-family: 'Inter', system-ui, sans-serif;
            color: var(--text-color);
            overflow: hidden;
        }

        .glass-container {
            padding: 40px 50px;
            border-radius: 28px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 80px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 600px;
            position: relative;
            box-sizing: border-box;
        }

        h1 { font-weight: 300; font-size: 2.5rem; margin-bottom: 25px; text-align: center; }
        
        input {
            width: 100%;
            padding: 16px 20px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: var(--input-bg);
            color: white;
            font-size: 1.1rem;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        /* Vùng thông tin góc dưới khung */
        .footer-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--glass-border);
            font-size: 0.9rem;
            color: var(--text-sub);
        }

        #clock { font-size: 1.2rem; color: white; }
    </style>
</head>
<body>

    <div class="glass-container">
        <h1 id="greeting">...</h1>
        
        <form id="search-form">
            <input type="text" id="search-input" placeholder="Tìm kiếm..." autofocus>
        </form>

        <div id="history-section">
            <ul id="history-suggestions"></ul>
        </div>

        <div class="footer-info">
            <span id="date">Ngày</span>
            <span id="weather">TP.HCM: 28°C</span>
            <span id="clock">00:00</span>
        </div>
    </div>

    <script>
        // Greeting
        const hour = new Date().getHours();
        document.getElementById('greeting').innerText = hour < 12 ? "Chào buổi sáng." : hour < 19 ? "Chào buổi chiều." : "Chào buổi tối.";

        // Update thời gian, ngày
        function updateDateTime() {
            const now = new Date();
            // Clock
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
            // Date
            document.getElementById('date').innerText = now.toLocaleDateString('vi-VN', { weekday: 'short', day: 'numeric', month: 'short' });
        }
        setInterval(updateDateTime, 1000);
        updateDateTime();

        // Search logic giữ nguyên như code cũ của bạn...
        const form = document.getElementById('search-form');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const q = document.getElementById('search-input').value;
            window.location.href = q.includes('.') ? (q.startsWith('http') ? q : 'https://' + q) : `https://www.google.com/search?q=${q}`;
        });
    </script>
</body>
</html>
