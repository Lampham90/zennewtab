<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>New Tab</title>
    <style>
        :root {
            --text-color: rgba(255, 255, 255, 0.9);
            --text-sub: rgba(255, 255, 255, 0.5);
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* ĐỔI THÀNH TRANSPARENT ĐỂ XUYÊN THẤU */
            background: transparent; 
            font-family: 'Inter', system-ui, sans-serif;
            color: var(--text-color);
            overflow: hidden;
        }

        .glass-container {
            padding: 50px 60px;
            border-radius: 28px;
            /* Tăng nhẹ opacity để nhìn thấy tấm kính */
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
            text-align: center;
            position: relative;
            box-sizing: border-box;
        }

        h1 { margin-top: 0; font-weight: 400; font-size: 2.8rem; margin-bottom: 25px; color: white; }

        input { 
            width: 100%; padding: 18px 25px; border-radius: 14px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            background: rgba(255, 255, 255, 0.05); 
            color: white; font-size: 1.1rem; outline: none; box-sizing: border-box; margin-bottom: 30px; 
        }

        #info-footer {
            position: absolute;
            bottom: 30px;
            right: 40px;
            text-align: right;
            font-size: 1rem;
            color: var(--text-sub);
            font-weight: 300;
        }
    </style>
</head>
<body>
    <div class="glass-container">
        <h1 id="greeting">Chào bạn</h1>
        <form id="search-form">
            <input type="text" name="q" id="search-input" placeholder="Tìm kiếm..." autofocus>
        </form>
        <div id="info-footer">
            <span id="date">--/--</span> | <span id="weather">TP.HCM: 29°C</span>
            <span id="clock">00:00</span>
        </div>
    </div>

    <script>
        function update() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('date').innerText = now.toLocaleDateString('vi-VN', { day: 'numeric', month: 'short' });
        }
        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
