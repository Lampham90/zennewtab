<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Tab</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #2e1065, #0f172a);
            font-family: 'Inter', system-ui, sans-serif;
            color: white;
            overflow: hidden;
        }

        .glass-container {
            padding: 40px;
            border-radius: 24px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        /* Đồng hồ & Thời tiết đặt ngay trong khung kính */
        .status-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            opacity: 0.7;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 1.1rem;
            outline: none;
            box-sizing: border-box;
        }

        /* Quick Links thiết kế chìm, nhẹ nhàng */
        .quick-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }
        .quick-links a {
            text-decoration: none;
            color: white;
            font-size: 1.2rem;
            padding: 8px 12px;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            transition: 0.3s;
        }
        .quick-links a:hover { background: rgba(255,255,255,0.15); }
    </style>
</head>
<body>

    <div class="glass-container">
        <!-- Đồng hồ và thời tiết nhỏ gọn phía trên -->
        <div class="status-bar">
            <span id="weather">28°C - TP.HCM</span>
            <span id="clock">00:00</span>
        </div>

        <h1 id="greeting" style="font-weight: 300; font-size: 1.5rem; opacity: 0.8; margin-bottom: 20px;">Chào buổi tối.</h1>
        
        <form id="search-form">
            <input type="text" id="search-input" placeholder="Tìm kiếm hoặc nhập URL..." autofocus>
        </form>

        <div class="quick-links">
            <a href="https://github.com" title="GitHub">💻</a>
            <a href="https://youtube.com" title="YouTube">📺</a>
            <a href="https://mail.google.com" title="Mail">✉️</a>
        </div>
    </div>

    <script>
        // JS giữ nguyên logic cũ, chỉ cập nhật hiển thị
        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();

        const form = document.getElementById('search-form');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const q = document.getElementById('search-input').value;
            window.location.href = q.includes('.') ? (q.startsWith('http') ? q : 'https://' + q) : `https://www.google.com/search?q=${q}`;
        });
    </script>
</body>
</html>
