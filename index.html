<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Tab</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, rgba(120, 50, 180, 0.3), #050810);
            font-family: 'Inter', system-ui, sans-serif;
            color: var(--text-color);
            overflow: hidden;
        }

        /* Khung chính */
        .glass-container {
            padding: 40px;
            border-radius: 24px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 1.1rem;
            outline: none;
            box-sizing: border-box;
        }

        /* Quick Links */
        .quick-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
        }
        .quick-links a {
            padding: 10px;
            background: var(--glass-bg);
            border-radius: 10px;
            transition: 0.3s;
        }
        .quick-links a:hover { background: rgba(255,255,255,0.2); }

        /* Khung ngoài */
        .info-box {
            position: absolute;
            padding: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            font-size: 1.2rem;
        }

        #clock { top: 30px; right: 30px; font-size: 2rem; font-weight: bold; }
        #weather { top: 30px; left: 30px; }
    </style>
</head>
<body>

    <div id="clock" class="info-box">00:00</div>
    <div id="weather" class="info-box">Đang tải...</div>

    <div class="glass-container">
        <h1 id="greeting" style="font-weight: 300; margin-bottom: 20px;">...</h1>
        <form id="search-form">
            <input type="text" id="search-input" placeholder="Tìm kiếm hoặc nhập URL..." autofocus>
        </form>

        <div class="quick-links">
            <a href="https://github.com" title="GitHub">💻</a>
            <a href="https://youtube.com" title="YouTube">📺</a>
            <a href="https://https://ghienphim-687.pages.dev" title="Mail">✉️</a>
            <a href="https://chatgpt.com" title="ChatGPT">🤖</a>
        </div>
    </div>

    <script>
        // Greeting
        const hour = new Date().getHours();
        document.getElementById('greeting').innerText = hour < 12 ? "Chào buổi sáng." : hour < 19 ? "Chào buổi chiều." : "Chào buổi tối.";

        // Clock
        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Weather (Mô phỏng - bạn cần API key từ OpenWeather để lấy data thật)
        document.getElementById('weather').innerText = "28°C - Hồ Chí Minh";

        // Search
        const form = document.getElementById('search-form');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const q = document.getElementById('search-input').value;
            window.location.href = q.includes('.') ? (q.startsWith('http') ? q : 'https://' + q) : `https://www.google.com/search?q=${q}`;
        });
    </script>
</body>
</html>
