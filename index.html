<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Tab</title>
    <link rel="icon" href="zen-browser-dark.svg" type="image/svg+xml">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(255, 255, 255, 0.1);
            --text-color: rgba(255, 255, 255, 0.9);
            --text-sub: rgba(255, 255, 255, 0.6);
            --font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, rgba(160, 210, 230, 0.2) 0%, rgba(160, 210, 230, 0) 40%),
                        radial-gradient(circle at 20% 60%, rgba(120, 50, 180, 0.3) 0%, rgba(120, 50, 180, 0) 50%),
                        radial-gradient(circle at 80% 40%, rgba(40, 110, 190, 0.3) 0%, rgba(40, 110, 190, 0) 50%), #050810;
            background-size: cover;
            font-family: var(--font-family);
            color: var(--text-color);
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(white, rgba(255,255,255,.2) 1px, transparent 2px),
                              radial-gradient(white, rgba(255,255,255,.1) 1px, transparent 1px);
            background-size: 200px 200px, 150px 150px;
            background-position: 0 0, 40px 60px;
            opacity: 0.1;
            z-index: 0;
        }

        .glass-container {
            z-index: 1;
            padding: 50px 60px;
            border-radius: 28px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 15px 50px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 600px;
            text-align: center;
            position: relative;
            box-sizing: border-box;
        }

        h1 { margin-top: 0; font-weight: 400; font-size: 2.8rem; margin-bottom: 25px; color: white; letter-spacing: -1px; }

        input { width: 100%; padding: 18px 25px; border-radius: 14px; border: 1px solid var(--glass-border); background: var(--input-bg); color: white; font-size: 1.1rem; outline: none; box-sizing: border-box; margin-bottom: 30px; }

        #history-section { text-align: left; margin-top: 20px; font-size: 1rem; }
        .history-icon { width: 18px; height: 18px; fill: var(--text-sub); margin-right: 15px; }
        #history-suggestions { list-style: none; padding: 0; margin: 0; }
        #history-suggestions li { margin-bottom: 12px; display: flex; align-items: center; }
        .history-item-text { color: var(--text-color); text-decoration: none; cursor: pointer; }

        /* Vùng thông tin mới ở góc dưới */
        #info-footer {
            position: absolute;
            bottom: 30px;
            right: 40px;
            text-align: right;
            font-size: 1rem;
            color: var(--text-sub);
            font-weight: 300;
        }
        #clock { font-size: 1.6rem; color: white; display: block; }
    </style>
</head>
<body>

    <div class="glass-container">
        <h1 id="greeting">...</h1>
        
        <form id="search-form">
            <input type="text" name="q" id="search-input" placeholder="..." autofocus>
        </form>
        
        <div id="history-section">
            <ul id="history-suggestions"></ul>
        </div>
        
        <div id="info-footer">
            <span id="date">--/--</span> | <span id="weather">---</span>
            <span id="clock">00:00</span>
        </div>
    </div>

    <script>
        // Cập nhật Greeting
        const hour = new Date().getHours();
        document.getElementById('greeting').innerText = hour < 12 ? "Chào buổi sáng." : hour < 19 ? "Chào buổi chiều." : "Chào buổi tối.";

        // Cập nhật Thời gian & Ngày
        function updateDateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('date').innerText = now.toLocaleDateString('vi-VN', { day: 'numeric', month: 'short' });
        }
        
        // Cập nhật Thời tiết (Giả lập theo thời gian)
        function updateWeather() {
            // Mặc định hiện tại là TP.HCM
            document.getElementById('weather').innerText = "TP.HCM: 29°C";
        }

        setInterval(updateDateTime, 1000);
        updateDateTime();
        updateWeather();

        // Lịch sử & Search giữ nguyên logic cũ của bạn
        const form = document.getElementById('search-form');
        const input = document.getElementById('search-input');
        const historySuggestions = document.getElementById('history-suggestions');

        const getHistory = () => JSON.parse(localStorage.getItem('zen_history') || '[]');
        
        function updateHistoryList() {
            const history = getHistory().slice(0, 3);
            historySuggestions.innerHTML = '';
            history.forEach(query => {
                const li = document.createElement('li');
                li.innerHTML = `<svg class="history-icon" viewBox="0 0 24 24"><path d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6a7 7 0 1 1 7 7 7 7 0 0 1-7-7H4a9 9 0 1 0 9-9Z"/></svg><a class="history-item-text">${query}</a>`;
                li.querySelector('.history-item-text').addEventListener('click', () => { input.value = query; form.requestSubmit(); });
                historySuggestions.appendChild(li);
            });
        }
        updateHistoryList();

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            let query = input.value.trim();
            if (!query) return;
            let history = getHistory();
            if (!history.includes(query)) {
                history.unshift(query);
                localStorage.setItem('zen_history', JSON.stringify(history.slice(0, 10)));
            }
            window.location.href = (query.includes('.') || query.startsWith('http')) ? (query.startsWith('http') ? query : 'https://' + query) : `https://www.google.com/search?q=${encodeURIComponent(query)}`;
        });
    </script>
</body>
</html>
