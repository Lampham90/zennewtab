<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>New Tab</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* NỀN CŨNG LÀ KÍNH MỜ NHÁM */
            background-color: #050810;
            background-image: 
                /* Tạo lớp hạt nhám (noise) cho toàn bộ trang */
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E"),
                radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050810 100%);
            background-blend-mode: overlay, normal;
            font-family: 'Inter', system-ui, sans-serif;
            color: white;
            overflow: hidden;
        }

        .glass-container {
            padding: 50px 60px;
            border-radius: 30px;
            /* Cấu trúc kính mờ nhám */
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(20px) saturate(150%);
            -webkit-backdrop-filter: blur(20px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        input { 
            width: 100%; padding: 18px 25px; border-radius: 15px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            background: rgba(255, 255, 255, 0.05); 
            color: white; font-size: 1.1rem; outline: none;
            transition: 0.3s;
        }
        input:focus { background: rgba(255, 255, 255, 0.1); }

        #info-footer {
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="glass-container">
        <h1 id="greeting">Chào bạn</h1>
        <form id="search-form">
            <input type="text" id="search-input" placeholder="Tìm kiếm..." autofocus>
        </form>
        <div id="info-footer">
            <span id="date">--/--</span> | <span id="weather">TP.HCM: 29°C</span> | <span id="clock">00:00</span>
        </div>
    </div>

    <script>
        function update() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('date').innerText = now.toLocaleDateString('vi-VN', { day: 'numeric', month: 'short' });
        }
        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
