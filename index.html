<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chào buổi tối.</title>
    <!-- Favicon tối giản cho Zen -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    <style>
        :root {
            /* Tinh chỉnh màu nền kính mờ hơn, tối hơn để hợp với vũ trụ */
            --glass-bg: rgba(0, 0, 0, 0.2); 
            --glass-border: rgba(255, 255, 255, 0.05);
            /* Màu nền input tối chìm, gần như không thấy viền */
            --input-bg: rgba(255, 255, 255, 0.03); 
            --text-color: rgba(255, 255, 255, 0.9);
            --text-sub: rgba(255, 255, 255, 0.5); /* Màu chữ phụ mờ hơn */
            --font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            
            /* --- SỬA CHÍNH: NỀN VŨ TRỤ CHUẨN Y HÌNH --- */
            /* Tạo mây vũ trụ sâu thẳm bằng radial-gradient nhiều lớp màu tối */
            background: 
                /* Lớp sáng nhẹ trung tâm */
                radial-gradient(circle at center, rgba(160, 210, 230, 0.1) 0%, rgba(160, 210, 230, 0) 40%),
                /* Lớp mây tím đậm */
                radial-gradient(circle at 20% 60%, rgba(80, 20, 140, 0.2) 0%, rgba(80, 20, 140, 0) 50%),
                /* Lớp mây xanh chàm đậm */
                radial-gradient(circle at 80% 40%, rgba(20, 80, 150, 0.2) 0%, rgba(20, 80, 150, 0) 50%),
                /* Nền tối sâu thẳm */
                #050810;
            background-size: cover;
            
            font-family: var(--font-family);
            color: var(--text-color);
            overflow: hidden;
            position: relative;
        }

        /* Thêm hiệu ứng chòm sao mờ, không quá sáng */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.1) 1px, transparent 1px),
                radial-gradient(white, rgba(255,255,255,.05) 1px, transparent 1px);
            background-size: 250px 250px, 180px 180px;
            background-position: 0 0, 40px 60px;
            opacity: 0.05; /* Rất rất mờ */
            z-index: 0;
        }

        .glass-container {
            z-index: 1;
            padding: 40px 50px;
            border-radius: 28px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px); /* Tăng độ mờ kính */
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 80px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 580px; /* Panel rộng y hình */
            text-align: left; /* Căn trái phần lịch sử, quick links */
            animation: fadeIn 1s ease-out;
            position: relative;
            box-sizing: border-box;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { 
            margin-top: 0; 
            font-weight: 300; 
            font-size: 2.8rem; /* Chữ lớn, mỏng */
            margin-bottom: 25px;
            color: white;
            letter-spacing: -1px;
            text-align: center; /* Căn giữa chữ chào */
        }

        #search-form {
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: var(--input-bg);
            color: white;
            font-size: 1.1rem;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus { 
            background: rgba(255,255,255,0.06); 
            border-color: rgba(255,255,255,0.2); 
            box-shadow: 0 0 10px rgba(255,255,255,0.05);
        }

        /* --- PHẦN TIỆN ÍCH MỚI (TÍCH HỢP TRONG PANEL) --- */
        .status-section {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 0.95rem;
            color: var(--text-sub);
            font-weight: 300;
        }

        /* --- QUICK LINKS (CÁC BIỂU TƯỢNG MỜ Y HÌNH) --- */
        .quick-links {
            display: flex;
            justify-content: left;
            gap: 20px;
            margin-bottom: 25px;
        }
        .quick-links a {
            text-decoration: none;
            color: var(--text-sub);
            font-size: 1.1rem;
            padding: 8px 12px;
            border-radius: 8px;
            background: rgba(255,255,255,0.02);
            transition: 0.2s ease, opacity 0.2s ease;
            opacity: 0.7; /* Mờ chìm */
        }
        .quick-links a:hover { 
            background: rgba(255,255,255,0.06);
            color: white;
            opacity: 1;
        }

        /* --- LỊCH SỬ TÌM KIẾM (Y HÌNH) --- */
        #history-section {
            text-align: left;
        }

        #history-title {
            color: var(--text-sub);
            margin-bottom: 12px;
            display: block;
            font-size: 0.9rem;
            font-weight: 400;
        }

        #history-suggestions {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        #history-suggestions li {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }

        /* Biểu tượng "search history" mờ */
        .history-icon {
            width: 16px;
            height: 16px;
            fill: var(--text-sub);
            margin-right: 12px;
            opacity: 0.6;
        }

        .history-item-text {
            color: var(--text-color);
            text-decoration: none;
            cursor: pointer;
            transition: color 0.2s ease;
            font-size: 0.95rem;
        }

        .history-item-text:hover {
            color: white;
        }

        /* Đồng hồ & Thời tiết tách khỏi panel chính, đặt mờ ở góc */
        .info-corner {
            position: absolute;
            font-size: 0.9rem;
            color: var(--text-sub);
            font-weight: 300;
            letter-spacing: 1px;
            opacity: 0.8;
            pointer-events: none; /* Không cho click */
        }

        #clock-corner { bottom: 30px; right: 40px; font-size: 1.4rem; font-weight: 300; }
        #weather-corner { bottom: 30px; left: 40px; text-align: left; }
    </style>
</head>
<body>

    <!-- Khung panel kính chính tập trung y hình -->
    <div class="glass-container">
        <!-- Chữ chào chính -->
        <h1 id="greeting">...</h1>
        
        <!-- Form tìm kiếm -->
        <form id="search-form">
            <input type="text" name="q" id="search-input" placeholder="..." autofocus>
        </form>
        
        <!-- --- QUICK LINKS (TÍCH HỢP) --- -->
        <div class="quick-links">
            <a href="https://github.com" title="GitHub">💻 GitHub</a>
            <a href="https://https://ghienphim-687.pages.dev" title="YouTube">📺 YouTube</a>
            <a href="https://mail.google.com" title="Gmail">✉️ Mail</a>
        </div>
        
        <!-- --- LỊCH SỬ TÌM KIẾM (Y HÌNH) --- -->
        <div id="history-section">
            <span id="history-title">Tìm kiếm history</span>
            <ul id="history-suggestions">
                <!-- Javascript sẽ điền các mục lịch sử vào đây -->
            </ul>
        </div>
    </div>

    <!-- Đồng hồ & Thời tiết tách biệt, đặt mờ ở góc y hình ban đầu -->
    <div id="clock-corner" class="info-corner">00:00</div>
    <div id="weather-corner" class="info-corner">Đang tải...</div>

    <script>
        // Dictionary dịch thuật
        const i18n = {
            'en': { greeting: ["Good morning.", "Good afternoon.", "Good evening."], placeholder: "Search or enter URL...", weatherFallback: "Ho Chi Minh City" },
            'es': { greeting: ["Buenos días.", "Buenas tardes.", "Buenas noches."], placeholder: "Buscar o escribir URL...", weatherFallback: "Ho Chi Minh City" },
            'vi': { greeting: ["Chào buổi sáng.", "Chào buổi chiều.", "Chào buổi tối."], placeholder: "Tìm kiếm history...", weatherFallback: "28°C - TP.HCM" },
        };

        // Detect ngôn ngữ, mặc định tiếng Việt
        const lang = navigator.language.split('-')[0];
        const t = i18n[lang] || i18n['vi']; 

        // Biểu tượng lịch sử SVG mờ
        const historyIconSVG = `<svg class="history-icon" viewBox="0 0 24 24"><path d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6a7 7 0 1 1 7 7 7 7 0 0 1-7-7H4a9 9 0 1 0 9-9Z"/></svg>`;

        // 1. Cài đặt greeting và placeholder
        const hour = new Date().getHours();
        const greetingIndex = hour < 12 ? 0 : hour < 19 ? 1 : 2;
        document.getElementById('greeting').innerText = t.greeting[greetingIndex];
        document.getElementById('search-input').placeholder = t.placeholder;

        // 2. Cập nhật đồng hồ ở góc
        function updateClock() {
            const now = new Date();
            document.getElementById('clock-corner').innerText = now.toLocaleTimeString('en-GB', { 
                hour: '2-digit', 
                minute: '2-digit', 
                hour12: false 
            });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 3. Hiển thị thời tiết mờ ở góc (Cậu có thể thay bằng API Key thật)
        document.getElementById('weather-corner').innerText = t.weatherFallback;

        // 4. Lịch sử tìm kiếm (SỬA ĐỂ HIỂN THỊ Y HÌNH)
        const form = document.getElementById('search-form');
        const input = document.getElementById('search-input');
        const historySuggestions = document.getElementById('history-suggestions');

        const getHistory = () => JSON.parse(localStorage.getItem('zen_history_v2') || '[]');
        
        // Cập nhật danh sách hiển thị
        function updateHistoryList() {
            const history = getHistory().slice(0, 3); // Chỉ lấy 3 mục như trong hình
            
            historySuggestions.innerHTML = ''; // Xóa danh sách cũ
            
            // Tạo các mục lịch sử mới với icon mờ
            history.forEach(query => {
                const li = document.createElement('li');
                li.innerHTML = `
                    ${historyIconSVG}
                    <a class="history-item-text">${query}</a>
                `;
                // Cho phép nhấn vào mục lịch sử để tìm lại
                li.querySelector('.history-item-text').addEventListener('click', () => {
                    input.value = query;
                    form.requestSubmit(); // Submit form
                });
                historySuggestions.appendChild(li);
            });
        }
        updateHistoryList();

        // Xử lý submit form
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            let query = input.value.trim();
            if (!query) return;

            // Lưu vào lịch sử (tối đa 5 mục)
            let history = getHistory();
            if (!history.includes(query)) {
                history.unshift(query);
                localStorage.setItem('zen_history_v2', JSON.stringify(history.slice(0, 5)));
            }

            // Xử lý điều hướng
            if ((query.includes('.') && !query.includes(' ')) || query.startsWith('http')) {
                window.location.href = query.startsWith('http') ? query : 'https://' + query;
            } else {
                window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
            }
        });

        // Giữ ô nhập luôn được focus
        const focusInput = document.getElementById('search-input');
        window.addEventListener('focus', () => focusInput.focus());
        document.addEventListener('click', () => focusInput.focus());
        document.addEventListener('keydown', () => focusInput.focus());
    </script>
</body>
</html>
